{% extends "base_admin.html" %}
{% block title %}Operations | Vehicle{% endblock %}
{% block header %}{{ 'Edit Vehicle' if vehicle else 'Add Vehicle' }}{% endblock %}
{% block content %}
<form method="post" enctype="multipart/form-data" class="grid grid-cols-1 md:grid-cols-2 gap-4">
  <div class="p-4 rounded-2xl bg-slate-900/50 border border-slate-800 space-y-3">
    <div>
      <label class="block text-sm mb-1">VIN</label>
      <input name="vin" value="{{ (form and form.get('vin')) or (vehicle and vehicle.vin) or '' }}" class="w-full px-3 py-2 rounded bg-slate-900/50 border border-slate-800" {% if vehicle %}readonly{% endif %}>
    </div>
    <div class="grid grid-cols-2 gap-3">
      <div>
        <label class="block text-sm mb-1">Make</label>
        <input name="make" value="{{ (form and form.get('make')) or (vehicle and vehicle.make) or '' }}" class="w-full px-3 py-2 rounded bg-slate-900/50 border border-slate-800">
      </div>
      <div>
        <label class="block text-sm mb-1">Model</label>
        <input name="model" value="{{ (form and form.get('model')) or (vehicle and vehicle.model) or '' }}" class="w-full px-3 py-2 rounded bg-slate-900/50 border border-slate-800">
      </div>
    </div>
    <div class="grid grid-cols-3 gap-3">
      <div>
        <label class="block text-sm mb-1">Year</label>
        <input type="number" name="year" value="{{ (form and form.get('year')) or (vehicle and vehicle.year) or '' }}" class="w-full px-3 py-2 rounded bg-slate-900/50 border border-slate-800">
      </div>
      <div>
        <label class="block text-sm mb-1">Lot Number</label>
        <input name="lot_number" value="{{ (form and form.get('lot_number')) or (vehicle and vehicle.lot_number) or '' }}" class="w-full px-3 py-2 rounded bg-slate-900/50 border border-slate-800">
      </div>
      <div>
        <label class="block text-sm mb-1">Auction Type</label>
        <select name="auction_type" class="w-full px-3 py-2 rounded bg-slate-900/50 border border-slate-800">
          {% for s in ['Copart','IAAI'] %}
          <option value="{{ s }}" {% if ((form and form.get('auction_type')) or (vehicle and vehicle.auction_type)) == s %}selected{% endif %}>{{ s }}</option>
          {% endfor %}
        </select>
      </div>
    </div>
    <div class="grid grid-cols-3 gap-3">
      <div>
        <label class="block text-sm mb-1">Purchase Date</label>
        <input type="date" name="purchase_date" value="{{ (form and form.get('purchase_date')) or (vehicle and vehicle.purchase_date and vehicle.purchase_date.strftime('%Y-%m-%d')) or '' }}" class="w-full px-3 py-2 rounded bg-slate-900/50 border border-slate-800">
      </div>
      <div>
        <label class="block text-sm mb-1">Purchase Price (USD)</label>
        <input type="number" step="0.01" name="purchase_price_usd" value="{{ (form and form.get('purchase_price_usd')) or (vehicle and vehicle.purchase_price_usd) or '' }}" class="w-full px-3 py-2 rounded bg-slate-900/50 border border-slate-800">
      </div>
      <div>
        <label class="block text-sm mb-1">Auction Fees</label>
        <input type="number" step="0.01" name="auction_fees_usd" value="{{ (form and form.get('auction_fees_usd')) or (vehicle and vehicle.auction_fees_usd) or '' }}" class="w-full px-3 py-2 rounded bg-slate-900/50 border border-slate-800">
      </div>
    </div>
    <div class="grid grid-cols-2 gap-3">
      <div>
        <label class="block text-sm mb-1">Local Transport Cost</label>
        <input type="number" step="0.01" name="local_transport_cost_usd" value="{{ (form and form.get('local_transport_cost_usd')) or (vehicle and vehicle.local_transport_cost_usd) or '' }}" class="w-full px-3 py-2 rounded bg-slate-900/50 border border-slate-800">
      </div>
      <div>
        <label class="block text-sm mb-1">Client</label>
        <select name="customer_id" class="w-full px-3 py-2 rounded bg-slate-900/50 border border-slate-800">
          <option value="">-- None --</option>
          {% for c in customers %}
          <option value="{{ c.id }}" {% if ((form and form.get('customer_id')) or (vehicle and vehicle.owner_customer_id)) == c.id %}selected{% endif %}>{{ c.company_name }}</option>
          {% endfor %}
        </select>
      </div>
    </div>
    <div>
      <label class="block text-sm mb-1">Status</label>
      <select name="status" class="w-full px-3 py-2 rounded bg-slate-900/50 border border-slate-800">
        {% for s in ['Purchased','Shipped','Arrived','Cleared','Delivered'] %}
        <option value="{{ s }}" {% if ((form and form.get('status')) or (vehicle and vehicle.status)) == s %}selected{% endif %}>{{ s }}</option>
        {% endfor %}
      </select>
    </div>
  </div>
  <div class="p-4 rounded-2xl bg-slate-900/50 border border-slate-800 space-y-3">
    <div>
      <label class="block text-sm mb-1">Photo (Before)</label>
      <input type="file" name="photo_before" class="w-full text-sm">
    </div>
    <div>
      <label class="block text-sm mb-1">Photo (After)</label>
      <input type="file" name="photo_after" class="w-full text-sm">
    </div>
  </div>
  <div class="md:col-span-2 flex justify-end gap-2">
    <a href="{{ url_for('ops.cars_list') }}" class="px-4 py-2 rounded bg-slate-800">Cancel</a>
    <button class="px-4 py-2 rounded bg-primary hover:bg-blue-500">Save</button>
  </div>
</form>
{% endblock %}
