{% extends "base_admin.html" %}
{% block title %}Operations | Customer{% endblock %}
{% block header %}{{ 'Edit Customer' if customer else 'Add Customer' }}{% endblock %}
{% block content %}
<form method="post" class="grid grid-cols-1 md:grid-cols-2 gap-4">
  <div class="p-4 rounded-2xl bg-slate-900/50 border border-slate-800 space-y-3">
    <div>
      <label class="block text-sm mb-1">Account Number</label>
      <input name="account_number" value="{{ customer and customer.account_number or '' }}" class="w-full px-3 py-2 rounded bg-slate-900/50 border border-slate-800">
    </div>
    <div>
      <label class="block text-sm mb-1">Company Name</label>
      <input name="company_name" value="{{ customer and customer.company_name or '' }}" class="w-full px-3 py-2 rounded bg-slate-900/50 border border-slate-800">
    </div>
    <div>
      <label class="block text-sm mb-1">Address</label>
      <textarea name="address" class="w-full px-3 py-2 rounded bg-slate-900/50 border border-slate-800" rows="5">{{ customer and customer.address or '' }}</textarea>
    </div>
  </div>
  <div></div>
  <div class="md:col-span-2 flex justify-end gap-2">
    <a href="{{ url_for('ops.customers_list') }}" class="px-4 py-2 rounded bg-slate-800">Cancel</a>
    <button class="px-4 py-2 rounded bg-primary hover:bg-blue-500">Save</button>
  </div>
</form>
{% endblock %}
