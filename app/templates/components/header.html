<header class="main-header is-rtl" id="site-header">
  <div class="main-header__inner">
    <!-- ✅ Logo -->
    <div class="main-header__left">
      <div class="main-header__logo">
        <a href="/">
          <img src="{{ url_for('static', filename='logo.jpeg') }}" alt="A1 Shipping Logo">
          <span>A1 SHIPPING</span>
        </a>
      </div>
    </div>

    <!-- ✅ Navigation -->
    <nav class="main-header__nav" aria-label="Main navigation">
      <ul class="main-header__nav-list">
        <li><a href="/ops/cars" class="main-header__link">السيارات</a></li>
        <li><a href="/ops/customers" class="main-header__link">العملاء</a></li>
        <li><a href="/acct/bol" class="main-header__link">المستندات</a></li>
        <li><a href="/ops/sale-listings" class="main-header__link">طلبات البيع</a></li>
        <li><a href="/admin/dashboard" class="main-header__link">لوحة التحكم</a></li>
      </ul>
    </nav>

    <!-- ✅ Actions -->
    <div class="main-header__actions">
      <!-- Search -->
      <div class="main-header__search">
        <form id="vehicle-search-form">
          <input
            type="text"
            class="main-header__input"
            id="vehicle-search-input"
            placeholder="رقم VIN"
          />
          <button type="submit" class="main-header__search-btn">
            <i class="fa-solid fa-magnifying-glass"></i>
          </button>
        </form>
      </div>

      <!-- Languages -->
      <div class="main-header__languages">
        <a href="?lang=ar" class="is-active">العربية</a>
        <a href="?lang=en">EN</a>
      </div>

      <!-- User -->
      <div class="main-header__user">
        <button class="main-header__user-btn" id="userMenuBtn">
          <i class="fa-regular fa-user"></i>
          <span>Admin</span>
        </button>
        <div class="main-header__user-menu" id="userMenu">
          <div class="main-header__user-name">مرحباً، Admin</div>
          <a href="/auth/logout">خروج</a>
        </div>
      </div>

      <!-- CTA -->
      <a href="#contact" class="main-header__cta">
        تواصل معنا <span>جديد</span>
      </a>
    </div>

    <!-- ✅ Mobile Toggle -->
    <button class="main-header__toggle" id="mobileToggle" aria-expanded="false" aria-controls="mobileMenu">
      <i class="fa-solid fa-bars"></i>
      <span class="sr-only">فتح القائمة</span>
    </button>

    <!-- ✅ Mobile Menu -->
    <div class="main-header__mobile" id="mobileMenu">
      <div class="main-header__mobile-search">
        <input type="text" placeholder="رقم VIN" />
        <button type="button"><i class="fa-solid fa-magnifying-glass"></i></button>
      </div>

      <nav class="main-header__mobile-nav" role="menu">
        <a href="/ops/cars" role="menuitem">السيارات</a>
        <a href="/ops/customers" role="menuitem">العملاء</a>
        <a href="/acct/bol" role="menuitem">المستندات</a>
        <a href="/ops/sale-listings" role="menuitem">طلبات البيع</a>
        <a href="/admin/dashboard" role="menuitem">لوحة التحكم</a>
      </nav>

      <div class="main-header__mobile-meta">
        <div class="main-header__mobile-account">
          <a href="/auth/logout">خروج</a>
        </div>

        <div class="main-header__languages">
          <a href="?lang=ar" class="is-active">العربية</a>
          <a href="?lang=en">EN</a>
        </div>

        <a href="#contact" class="main-header__mobile-cta">تواصل معنا</a>
      </div>
    </div>
  </div>
</header>

<div class="main-header__overlay" id="menuOverlay" style="display:none;"></div>


<script>
document.addEventListener("DOMContentLoaded", () => {
  const body = document.body;
  const header = document.getElementById("site-header");
  const toggle = document.getElementById("mobileToggle");
  const menu = document.getElementById("mobileMenu");
  const overlay = document.getElementById("menuOverlay");
  const userBtn = document.getElementById("userMenuBtn");
  const userMenu = document.getElementById("userMenu");

  // Mobile toggle
  toggle.addEventListener("click", () => {
    const isOpen = header.classList.toggle("main-header--open");
    toggle.setAttribute("aria-expanded", isOpen);
    body.classList.toggle("menu-open", isOpen);
  });

  overlay.addEventListener("click", () => {
    header.classList.remove("main-header--open");
    body.classList.remove("menu-open");
  });

  // User dropdown
  userBtn.addEventListener("click", (e) => {
    e.stopPropagation();
    userMenu.classList.toggle("open");
  });

  document.addEventListener("click", (e) => {
    if (!userMenu.contains(e.target) && !userBtn.contains(e.target)) {
      userMenu.classList.remove("open");
    }
  });

  // VIN search
  const form = document.getElementById("vehicle-search-form");
  const input = document.getElementById("vehicle-search-input");
  if (form) {
    form.addEventListener("submit", (e) => {
      e.preventDefault();
      const vin = input.value.trim();
      if (vin) window.location.href = "/tracking/" + encodeURIComponent(vin);
    });
  }
});
    // 🩵 Fix: remove stuck menu state after reload or navigation
  window.addEventListener("pageshow", () => {
    document.body.classList.remove("menu-open");
    const header = document.getElementById("site-header");
    if (header) header.classList.remove("main-header--open");
  });

</script>
