{% extends "base_accounting.html" %}
{% block acct_content %}
<h2 class="text-xl font-semibold mb-4">{% if g.get('lang_code') == 'ar' %}إعدادات المحاسبة{% else %}Accounting Settings{% endif %}</h2>
<form method="post" class="max-w-xl bg-slate-900/40 p-4 rounded-2xl border border-slate-800 space-y-3">
  <div>
    <label class="block text-sm mb-1">{% if g.get('lang_code') == 'ar' %}نسبة الجمارك (%) {% else %}Customs Rate (%) {% endif %}</label>
    <input name="customs_rate" value="{{ settings.customs_rate or '' }}" class="w-full bg-slate-900 border border-slate-700 rounded p-2" />
  </div>
  <div>
    <label class="block text-sm mb-1">{% if g.get('lang_code') == 'ar' %}ضريبة القيمة المضافة (%) {% else %}VAT (%) {% endif %}</label>
    <input name="vat_rate" value="{{ settings.vat_rate or '' }}" class="w-full bg-slate-900 border border-slate-700 rounded p-2" />
  </div>
  <div>
    <label class="block text-sm mb-1">{% if g.get('lang_code') == 'ar' %}رسوم الشحن المحلية (ر.ع){% else %}Local Shipping Fee (OMR){% endif %}</label>
    <input name="shipping_fee" value="{{ settings.shipping_fee or '' }}" class="w-full bg-slate-900 border border-slate-700 rounded p-2" />
  </div>
  <div>
    <label class="block text-sm mb-1">{% if g.get('lang_code') == 'ar' %}نسبة التأمين (%) {% else %}Insurance Rate (%) {% endif %}</label>
    <input name="insurance_rate" value="{{ settings.insurance_rate or '' }}" class="w-full bg-slate-900 border border-slate-700 rounded p-2" />
  </div>
  <div class="pt-2">
    <button class="px-4 py-2 rounded bg-primary text-white">{% if g.get('lang_code') == 'ar' %}حفظ{% else %}Save{% endif %}</button>
  </div>
</form>
{% endblock %}
